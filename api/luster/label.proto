syntax = "proto3";

package blueapi.api.luster;

import "google/api/field_behavior.proto";

option go_package = "github.com/alphauslabs/blue-sdk-go/api/luster";
option java_package = "cloud.alphaus.blueapi.api.luster";
option java_outer_classname = "ApiLusterLabelProto";

// The message defines the label
message Label {
  // The label id.
  string id = 1;

  // The label name.
  string name = 2;

  // The label color.
  string color = 3;

  // The label description.
  string description = 4;

  // The label createdAt.
  // "created_at": "2023-10-27T10:00:00Z"
  string created_at = 5
   [(google.api.field_behavior) = OUTPUT_ONLY];

  // The label updatedAt.
  // "updated_at": "2023-10-27T10:00:00Z"
  string updated_at = 6
   [(google.api.field_behavior) = OUTPUT_ONLY];
}