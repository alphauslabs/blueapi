syntax = "proto3";

package blueapi.api.luster;

option go_package = "github.com/alphauslabs/blue-sdk-go/api/luster";
option java_package = "cloud.alphaus.blueapi.api.luster";
option java_outer_classname = "ApiLusterHubProto";

// The message defines the hub
message Hub {
  // The hub id.
  string id = 1;

  // The hub name.
  string name = 2;

  // The cost in hub.
  repeated string cost = 3;

  // The recommendation in hub.
  repeated string recommendation = 4;
}