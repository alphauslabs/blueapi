syntax = "proto3";

package blueapi.api.luster;

import "google/api/field_behavior.proto";

option go_package = "github.com/alphauslabs/blue-sdk-go/api/luster";
option java_package = "cloud.alphaus.blueapi.api.luster";
option java_outer_classname = "ApiLusterSpaceProto";

// The message defines the space
message Space {
  // The space id.
  string id = 1;

  // The space name.
  string name = 2;

  // The space description.
  string description = 3;

  // The members in space.
  repeated string members = 4;

  // The space created_at.
  // "created_at": "2023-10-27T10:00:00Z"
  string created_at = 5
   [(google.api.field_behavior) = OUTPUT_ONLY];

  // The space updated_at.
  // "updated_at": "2023-10-27T10:00:00Z"
  string updated_at = 6
   [(google.api.field_behavior) = OUTPUT_ONLY];
}