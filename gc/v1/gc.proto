syntax = "proto3";

package blueapi.gc.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/alphauslabs/blueapi/gc";
option java_package = "cloud.alphaus.api.gc";
option java_outer_classname = "GuaranteedCommitmentsProto";

// GuaranteedCommitments service definition.
service GuaranteedCommitments {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    description: "(Alpha) GuaranteedCommitments API. Base URL: https://api.alphaus.cloud/m/blue/gc"
    external_docs: {
      url: "https://github.com/alphauslabs/blueapi/tree/main/gc/";
      description: "Service definition";
    }
  };

  // WORK-IN-PROGRESS: List all the registered orgs
  rpc ListOrgs(ListOrgsRequest) returns (stream Org) {
    option (google.api.http) = {
      post: "/v1/organizations:read"
      body: "*"
    };
  }

  // ####################### COMMITMENT PLANS #######################

  // WORK-IN-PROGRESS: Executes a commitment purchase plan, initiating the commitment purchase process.
  rpc CommitmentsPlanApply(CommitmentPlanApplyRequest) returns (CommitmentPlanDetails) {
    option (google.api.http) = {
      post: "/v1/commitments/plan/{planId}/apply"
      body: "*"
    };
  }

  // ####################### COMMITMENTS #######################

  // WORK-IN-PROGRESS: Retrieves a list of commitments.
  rpc ListCommitments(ListCommitmentsRequest) returns (ListCommitmentsResponse) {
    option (google.api.http) = {
      get: "/v1/commitments"
    };
  }

  // WORK-IN-PROGRESS: Generates time-series chart data for commitment metrics over the specified time period.
  rpc GetCommitmentsChart(GetCommitmentsChartRequest) returns (CommitmentsChartResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/{commitmentId}/chart"
    };
  }

  // WORK-IN-PROGRESS: Generates utilization data for commitment over the active period.
  rpc GetCommitmentsUtilization(GetCommitmentsUtilizationRequest) returns (CommitmentsUtilizationResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/{commitmentId}/utilization"
    };
  }

  // ####################### METRICS #######################

  // WORK-IN-PROGRESS: Do not use. Retrieves key performance metrics for cloud commitments.
  rpc GetMetrics(GetMetricsRequest) returns (MetricsResponse) {
    option (google.api.http) = {
      get: "/v1/metrics"
    };
  }

  // ####################### RESOURCES #######################

  // WORK-IN-PROGRESS: Do not use. Retrieves a list of infrastructure resources for the organization.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/resources"
    };
  }

  // WORK-IN-PROGRESS: Do not use. Retrieves daily usage data for a specific resource within the specified date range.
  rpc GetResourceDailyUsage(GetResourceDailyUsageRequest) returns (GetResourceDailyUsageResponse) {
    option (google.api.http) = {
      get: "/v1/resources/{resourceId}/dailyusage"
    };
  }


 // DEVELOPER'S NOTE: FOR Infrastructure Plan

  // WORK-IN-PROGRESS: Retrieves a paginated list of reservable infrastructure resources for a segment.
  // Supports filtering, sorting, and a date range for usage aggregation.
  rpc ListReservableResources(ListReservableResourcesRequest) returns (ListReservableResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/resources"
    };
  }

  // ####################### SEGMENTS #######################

  // WORK-IN-PROGRESS: Do not use. Retrieves all segments for the specified organization and provider.
  //rpc ListSegments(ListSegmentsRequest) returns (ListSegmentsResponse) {
  //  option (google.api.http) = {
  //    get: "/v1/segments/info"
  //  };
  //}

  // WORK-IN-PROGRESS: Retrieves detailed information about a specific segment.
  //rpc GetSegmentDetails(GetSegmentDetailsRequest) returns (SegmentDetails) {
  //  option (google.api.http) = {
  //    get: "/v1/segments/{segmentId}"
  //  };
  //}

  // WORK-IN-PROGRESS: Retrieves purchase plan of a company.
  rpc ListPurchasePlansBySegment(ListPurchasePlansBySegmentRequest) returns (ListPurchasePlansBySegmentResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/purchaseplans"
    };
  }

  // WORK-IN-PROGRESS: Get the updated details of the plan after the apply plan.
  rpc GetUpdatedPurchasePlansBySegment(GetUpdatedPurchasePlansBySegmentRequest) returns (GetUpdatedPurchasePlansBySegmentResponse) {
    option (google.api.http) = {
      post: "/v1/commitments/purchaseplans:update"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Retrieves full details of a specific purchase plan of a company.
  // Includes the basic info, detailed metrics, commitment line items, covered infrastructure resource matches, and audit history.
  rpc GetPurchasePlansDetails(GetPurchasePlansDetailsRequest) returns (GetPurchasePlansDetailsResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/purchaseplans/{planId}"
    };
  }

  // WORK-IN-PROGRESS: Saves a commitment purchase plan as draft.
  rpc SaveCommitmentsPlanAsDraft(SaveCommitmentsPlanAsDraftRequest) returns (DefaultPurchasePlan) {
    option (google.api.http) = {
      post: "/v1/commitments/purchaseplans/draft/{planId}"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Retrieves the drafted purchase plans
  rpc ListDraftPurchasePlans(ListDraftPurchasePlansRequest) returns (ListDraftPurchasePlansResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/purchaseplans/draft"
    };
  }


 // WORK-IN-PROGRESS: Deletes a drafted purchase plan.
  rpc DeleteDraftPurchasePlan(DeleteDraftPurchasePlanRequest) returns (DeleteDraftPurchasePlanResponse) {
    option (google.api.http) = {
      delete: "/v1/commitments/purchaseplans/draft/{draftPlanId}"
    };
  }


 // DEVELOPER'S NOTE: FOR Infrastructure Plan and custom (top-down) commitment plan

  // WORK-IN-PROGRESS: Retrieves the available commitment types for a given provider.
  rpc GetAvailableCommitmentTypes(GetAvailableCommitmentTypesRequest) returns (GetAvailableCommitmentTypesResponse) {
    option (google.api.http) = {
      get: "/v1/commitments/purchaseplans/availabletypes"
    };
  }

 // DEVELOPER'S NOTE: FOR Infrastructure Plan and custom (top-down) commitment plan

  // WORK-IN-PROGRESS: Creates a custom (top-down) commitment purchase plan.
  rpc CreateCustomCommitmentPlan(CreateCustomCommitmentPlanRequest) returns (DefaultPurchasePlan) {
    option (google.api.http) = {
      post: "/v1/commitments/purchaseplans/custom"
      body: "*"
    };
  }

  // ------------------------ ONBOARDING ------------------------

  // WORK-IN-PROGRESS: Registers a new child organization under the channel partner.
  // Creates the organization, sets up user memberships, and establishes the partnership relationship.
  rpc RegisterOrg(RegisterOrgRequest) returns (RegisterOrgResponse) {
    option (google.api.http) = {
      post: "/v1/onboarding"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Starts the onboarding process for an organization.
  // Creates or retrieves an onboarding record and sets the provider to AWS.
  rpc StartAwsOnboarding(StartAwsOnboardingRequest) returns (StartAwsOnboardingResponse) {
    option (google.api.http) = {
      post: "/v1/onboarding/aws/start"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Generates CloudFormation template for AWS integration.
  // Creates the necessary IAM role and policy template for setting up AWS access.
  rpc GetAwsCloudFormationTemplate(GetAwsCloudFormationTemplateRequest) returns (GetAwsCloudFormationTemplateResponse) {
    option (google.api.http) = {
      get: "/v1/onboarding/aws/cloudformation/template"
    };
  }

  // WORK-IN-PROGRESS: Generates AWS CloudFormation launch stack URL.
  // Creates a pre-configured URL to deploy the CloudFormation stack in the AWS console.
  rpc GetAwsLaunchStackUrl(GetAwsLaunchStackUrlRequest) returns (GetAwsLaunchStackUrlResponse) {
    option (google.api.http) = {
      get: "/v1/onboarding/aws/cloudformation/launchstackurl"
    };
  }

  // WORK-IN-PROGRESS: Runs AWS onboarding verification process.
  // Creates a new CUR or uses an existing CUR and verifies AWS integration setup
  // and returns validation status for all required features.
  rpc VerifyAwsOnboarding(VerifyAwsOnboardingRequest) returns (VerifyAwsOnboardingResponse) {
    option (google.api.http) = {
      post: "/v1/onboarding/aws/verify"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Retrieves the latest onboarding status for:
  // - an MSP
  // - a company under an MSP
  // - a payer account under an MSP
  rpc GetOnboardingStatus(GetOnboardingStatusRequest) returns (GetOnboardingStatusResponse) {
    option (google.api.http) = {
      post: "/v1/onboarding/status:read"
      body: "*"
    };
  }

  // WORK-IN-PROGRESS: Lists payer accounts associated with the organization.
  // Retrieves all payer accounts linked to the organization, including their status and associated segments.
  rpc ListPayerAccounts(ListPayerAccountsRequest) returns (ListPayerAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/managements/accounts"
    };
  }

  rpc SetPayerAccountEnabled(SetPayerAccountEnabledRequest) returns (SetPayerAccountEnabledResponse) {
    option (google.api.http) = {
      post: "/v1/managements/accounts/{companyId}"
      body: "*"
    };
  }

  rpc GetPayerAccountStatus(GetPayerAccountStatusRequest) returns (GetPayerAccountStatusResponse) {
    option (google.api.http) = {
      get: "/v1/managements/accounts/status"
    };
  }

  rpc ListBillingGroups(ListBillingGroupsRequest) returns (ListBillingGroupsResponse) {
    option (google.api.http) = {
      get: "/v1/managements/billinggroups"
    };
  }

  rpc SetBillingGroupStatus(SetBillingGroupStatusRequest) returns (SetBillingGroupStatusResponse) {
    option (google.api.http) = {
      post: "/v1/managements/billinggroups/{companyId}"
      body: "*"
    };
  }

  rpc GetBillingGroupStatus(GetBillingGroupStatusRequest) returns (GetBillingGroupStatusResponse) {
    option (google.api.http) = {
      get: "/v1/managements/billinggroups/status"
    };
  }

  rpc ValidateBillingGroup(ValidateBillingGroupRequest) returns (ValidateBillingGroupResponse) {
  option (google.api.http) = {
    post: "/v1/onboarding/billinggroup:validate"
    body: "*"
    };
  }

    // GetGuaranteedCommitmentTemplateUrl returns a CloudFormation launch URL for deploying
  // both Alphaus (Ripple) and Archera IAM roles in a single stack.
  rpc GetGuaranteedCommitmentTemplateUrl(GetGuaranteedCommitmentTemplateUrlRequest) returns (GetGuaranteedCommitmentTemplateUrlResponse) {
    option (google.api.http) = {
      get: "/v1/onboarding/aws/cftemplate/guaranteed:url"
    };
  }

  // CreateGuaranteedCommitmentAccess verifies and registers a deployed guaranteed CloudFormation stack.
  rpc CreateGuaranteedCommitmentAccess(CreateGuaranteedCommitmentAccessRequest) returns (CreateGuaranteedCommitmentAccessResponse) {
    option (google.api.http) = {
      post: "/v1/onboarding/aws/cftemplate/guaranteed"
      body: "*"
    };
  }

// ####################### AZURE ONBOARDING #######################

// WORK-IN-PROGRESS: Starts the Azure onboarding process.
// Creates an onboarding record in Archera for the given org and returns the onboardingId.
// Stores the Ripple billingGroupId/companyId association for later use.
rpc StartAzureOnboarding(StartAzureOnboardingRequest) returns (StartAzureOnboardingResponse) {
  option (google.api.http) = {
    post: "/v1/onboarding/azure/start"
    body: "*"
  };
}

// ## Developers guide, will be deleted once documentation is in place ##
// Used for multiple PATCH steps: setting azure resource config (step 2/3),
// selecting account kind (step 5.5), and selecting account IDs (step 7).

// WORK-IN-PROGRESS: Updates the Azure onboarding record.
rpc UpdateAzureOnboarding(UpdateAzureOnboardingRequest) returns (AzureOnboardingState) {
  option (google.api.http) = {
    post: "/v1/onboarding/azure/{onboardingId}:update"
    body: "*"
  };
}

// WORK-IN-PROGRESS: Returns the Azure OAuth URL the user must visit to authorize Archera.
rpc GetAzureOnboardingAuthUrl(GetAzureOnboardingAuthUrlRequest) returns (GetAzureOnboardingAuthUrlResponse) {
  option (google.api.http) = {
    get: "/v1/onboarding/azure/{onboardingId}/authurl"
  };
}


// ## Developers guide, will be deleted once documentation is in place ##
// Called after the user visits the auth URL (step 4).

// WORK-IN-PROGRESS: Validates that the Azure app was installed and the user authorized it.
rpc ValidateAzureAppInstall(ValidateAzureAppInstallRequest) returns (AzureOnboardingState) {
  option (google.api.http) = {
    post: "/v1/onboarding/azure/{onboardingId}/validate"
    body: "*"
  };
}

// WORK-IN-PROGRESS: Lists the available Azure subscriptions or billing accounts
// for the user to select during onboarding.
rpc ListAzureOnboardingAccounts(ListAzureOnboardingAccountsRequest) returns (ListAzureOnboardingAccountsResponse) {
  option (google.api.http) = {
    get: "/v1/onboarding/azure/{onboardingId}/accounts"
  };
}


// Persists the Ripple billingGroupId/companyId mapping alongside the Archera integration.

// WORK-IN-PROGRESS: Creates the Azure cloud integration after all onboarding steps complete.
rpc CreateAzureIntegration(CreateAzureIntegrationRequest) returns (CreateAzureIntegrationResponse) {
  option (google.api.http) = {
    post: "/v1/onboarding/azure/integration"
    body: "*"
  };
}

// WORK-IN-PROGRESS: Lists Azure integrations to verify onboarding completion.
rpc ListAzureIntegrations(ListAzureIntegrationsRequest) returns (ListAzureIntegrationsResponse) {
  option (google.api.http) = {
    get: "/v1/onboarding/azure/integrations"
  };
}


}

// ####################### ENUMS #######################

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  AWS = 1;
  AZURE = 2;
  GCP = 3;
  KUBERNETES = 4;
  UNKNOWN = 5;
}

enum CommitmentStatus {
  COMMITMENT_STATUS_UNSPECIFIED = 0;
  NEW = 1;
  REVIEWED = 2;
  SCHEDULED = 3;
  COMPLETED = 4;
  DRAFT = 5;
  NEEDS_REVIEW = 6;
  IN_PROGRESS = 7;
}

enum CommitmentInventoryStatus {
  COMMITMENT_INVENTORY_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  RETIRED = 2;
  PAYMENT_PENDING = 3;
  PAYMENT_FAILED = 4;
}

enum Scope {
  SCOPE_UNSPECIFIED = 0;
  SHARED = 1;
  REGIONAL = 2;
  ZONAL = 3;
}

enum UsageType {
  USAGE_TYPE_UNSPECIFIED = 0;
  RUNNING = 1;
  STOPPED = 2;
}

// ####################### REQUEST MESSAGES #######################

message ListOrgsRequest {}


message CommitmentPlanApplyRequest {
  string planId = 1;
}

message ListCommitmentsRequest {}

message GetCommitmentsChartRequest {
  // Required. The commitment id.
  string commitmentId = 1;
  // Required. The group filter. Available filters include `region`, `service`, `instanceType`, `instanceTypeFamily`, `usageType` and `operation`.
  string groupBy = 2;
  string startDate = 3;
  string endDate = 4;
}

message GetCommitmentsUtilizationRequest {
  // Required. The commitment id.
  string commitmentId = 1;
}

message GetMetricsRequest {
  Provider provider = 1;
}

message ListResourcesRequest {
  Provider provider = 1;
  string segmentId = 2;
  string search = 3;
  bool desc = 4;
  string orderBy = 5;
  int32 page = 6;
  int32 pageSize = 7;
}

message GetResourceDailyUsageRequest {
  string resourceId = 1;
  string startDate = 2;
  string endDate = 3;
  string catalogSkuId = 4;
  int32 page = 5;
  int32 pageSize = 6;
}

message ListReservableResourcesRequest {
  // // Required. The segment ID to scope the query to.
  // string segmentId = 1;
  // // Optional. Field to sort by. Example: "ondemand_cost".
  // string orderBy = 2;
  // // Optional. If true, sort in descending order.
  // bool desc = 3;
  // // Optional. URL-encoded JSON filter expression.
  // // Example (decoded): {"and":[{"and":[{"field":"covered_usage","op":"<","value":1}]},{"and":[{"field":"is_reservable","op":"=","value":"true"}]}]}
  // string filter = 4;
  // // Required. Start of the usage lookback window (YYYY-MM-DD).
  // string startDate = 5;
  // // Required. End of the usage lookback window (YYYY-MM-DD).
  // string endDate = 6;
  // // Optional. Page number (1-based).
  // int32 page = 7;
  // // Optional. Number of results per page.
  // int32 pageSize = 8;
}

message ListPurchasePlansBySegmentRequest {
}

message GetPurchasePlansDetailsRequest {
  string planId = 1;
}
// message GetDraftPurchasePlansDetailsRequest {
//   // The draft plan ID to retrieve details for.
//   string draftPlanId = 1;
// }

message GetUpdatedPurchasePlansBySegmentRequest {
}

// ------------------------ ONBOARDING REQUEST ------------------------

message OrgUser {
  string email = 1;
  string role = 2;
}

message Membership {
  string role = 1;
  string username = 2;
}

message Address {
  // required: ex. "123 Main St"
  string line1 = 1;
  // required: ex. "Springfield"
  string city = 2;
  // required: ex. "IL"
  string state = 3;
  // required: ex. "62701"
  string zip = 4;
  // required: ex. "USA"
  string country = 5;
  // optional: ex. "Apt 4B"
  string line2 = 6;
}

message AwsExistingCur {
  // required if existingCur is provided
  string region = 1;
  // required if existingCur is provided
  string bucket = 2;
  // required if existingCur is provided
  string prefix = 3;
  // required if existingCur is provided
  string reportName = 4; // maps to "report_name" conceptually
}

message RegisterOrgRequest {

  string name = 1;
  string labraSubscriptionId = 2;
  repeated OrgUser users = 3;
  string domain = 4;
  Address primaryAddress = 5;
  string awsMarketplaceOfferLink = 6;
  string azureMarketplaceOfferLink = 7;
  string gcpMarketplaceOfferLink = 8;
}

message StartAwsOnboardingRequest {
  // Optional: if present => MSP customer (3rd layer), else MSP-level org (2nd layer)
  string billingGroupId = 1;
  string companyId = 2;
  string gcOrgId = 3;

  string payerAccountId = 4;
  string payerAccountName = 5;
}

message GetAwsCloudFormationTemplateRequest {
  // Optional: if present => MSP customer (3rd layer), else MSP-level org (2nd layer)
  string billingGroupId = 1;
  string companyId = 2;

  string gcOrgId = 3;
  
  string payerAccountId = 4;
  string payerAccountName = 5;
}

message GetAwsLaunchStackUrlRequest {
  // Optional: if present => MSP customer (3rd layer), else MSP-level org (2nd layer)
  string billingGroupId = 1;
  string companyId = 2;

  string gcOrgId = 3;

  
  string payerAccountId = 4;
  string payerAccountName = 5;
}

message VerifyAwsOnboardingRequest {
  // Optional: if present => MSP customer (3rd layer), else MSP-level org (2nd layer)
  string billingGroupId = 1;
  string companyId = 2;

  string gcOrgId = 3;

  // From /start response
  string onboardingId = 4;

  // AWS account id being onboarded/verified
  string accountId = 5;

  // Optional: if set, GuaranteedCommitments will use this existing CUR. If omitted, GuaranteedCommitments may create a new CUR.
  AwsExistingCur existingCur = 6;
}

message GetOnboardingStatusRequest {
  // Optional:
  // - all empty => MSP-level onboarding row
  // - companyId set => company flow
  // - payerAccountId set => payer-account flow
  // billingGroupId may accompany company flow
  string billingGroupId = 1;
  string companyId = 2;
  string payerAccountId = 3;
}

message ListPayerAccountsRequest {}

message SetPayerAccountEnabledRequest {
  string companyId = 1;
  bool enabled = 2;
}

message GetPayerAccountStatusRequest {}

message ListBillingGroupsRequest {}

message SetBillingGroupStatusRequest {
  string companyId = 1;
  bool enabled = 2;

  // temporarily required until we fully transition to the new onboarding flow.
  // This is to avoid any breaks or crash during the transition. Will be removed once the transition is complete.
  // Default value is false.
  bool newVersion = 3;
}

message GetBillingGroupStatusRequest {}

message ValidateBillingGroupRequest {
  // Required. Company identifier.
  string companyId = 1;

  // temporarily required until we fully transition to the new onboarding flow.
  // This is to avoid any breaks or crash during the transition. Will be removed once the transition is complete.
  // Default value is false.
  bool newVersion = 2;
}

message SaveCommitmentsPlanAsDraftRequest {
  // Required. The commitment purchase plan ID to save as draft.
  string planId = 1;
  repeated string reservationIds = 2;
  repeated string resourceIds = 3;
  double maxUpfrontCost = 4;
  Provider provider = 5;
  string endDate = 6;
  string startDate = 7;
  string segmentId = 8;
  // Required.
  string status = 9;
  // Required.
  string description = 10;
  // Required.
  string name = 11;
  string preferredPaymentOption = 12;
  repeated string includedContractTerms = 13;
  repeated ContractSpec includedContractSpecs = 14;
  google.protobuf.Value coverageId = 15;
  string createdAt = 16;
  google.protobuf.Value createdBy = 17;
  string dataSource = 18;
  google.protobuf.Value executionPolicy = 19;
  repeated string flaggedActions = 20;
  string id = 21;
  bool isCalculating = 22;
  bool isDefault = 23;
  bool isLocked = 24;
  bool isRecommended = 25;
  bool isRenewal = 26;
  bool isSaved = 27;
  string lastModified = 28;
  string metaPlanId = 29;
  google.protobuf.Value minimumUpfrontInterestRate = 30;
  string orgId = 31;
  string planType = 32;
  google.protobuf.Value recommendWithinCoveredAccounts = 33;
  Segment segment = 34;
}

message ListDraftPurchasePlansRequest {
  // If set to true, returns plans with Draft status. If set to false, returns plans with Submitted and Executed status.
  bool isDraft = 1;
}

message DeleteDraftPurchasePlanRequest {
  // Required. The draft plan ID to delete.
  string draftPlanId = 1;
}

message GetAvailableCommitmentTypesRequest {
  // Required. The cloud provider to query available types for.
  // Acceptable values: "aws", "azure", "gcp".
  string provider = 1;
}

// CreateCustomCommitmentPlanRequest creates a new top-down custom commitment plan.
message CreateCustomCommitmentPlanRequest {
  // Required. The cloud provider. Acceptable values: "aws", "azure", "gcp".
  string provider = 1;
  // Required. ISO 8601 lookback window start timestamp (e.g. "2026-04-09T02:43:39.717Z").
  string startDate = 2;
  // Required. ISO 8601 lookback window end timestamp (e.g. "2026-04-16T02:43:39.717Z").
  string endDate = 3;
  // Required. The segment ID to scope the plan to.
  string segmentId = 4;
  // Plan status. Use "draft" to save without submitting.
  // Acceptable values: "draft", "submitted".
  string status = 5;
  // Optional. Human-readable description for the plan.
  string description = 6;
  // Required. Human-readable name for the plan.
  string name = 7;
  // List of contract specifications to include in the plan.
  // Each entry selects a commitment category, term, payment option, and optional properties.
  //
  // Acceptable commitment_type values:
  //   "aws/AmazonEC2", "aws/AmazonRDS", "aws/AmazonElastiCache",
  //   "aws/savingsplan/Compute", "aws/savingsplan/EC2Instance", "aws/savingsplan/Database"
  //
  // Acceptable term values:
  //   "thirty_day_gris"  - 30-day Archera Insured (leased: true)
  //   "one_year_gris"    - 1-year Archera Insured (leased: true)
  //   "one_year"         - 1-year Native Uninsured (leased: false)
  //   "three_year"       - 3-year Native Uninsured (leased: false)
  //
  // Acceptable payment_option values:
  //   "no_upfront", "partial_upfront", "all_upfront"
  //   Note: "partial_upfront" and "all_upfront" are not available for 30-day terms.
  //
  // Acceptable properties keys:
  //   "leased" (bool)          - true for Archera Insured terms, false for Native terms.
  //   "offering_class" (string) - only for "aws/AmazonEC2"; "convertible" or "standard".
  repeated ContractSpec includedContractSpecs = 8;
  // List of contract term keys included in the plan.
  // Acceptable values: "thirty_day_gris", "one_year_gris", "one_year", "three_year".
  repeated string includedContractTerms = 9;
  // Optional. Specific resource IDs to pin the plan to selected infrastructure resources.
  // When populated, the server returns plan_type "infrastructure"; omit for a top-down
  // "purchase" plan. IDs are composite strings in the format
  // "{resource_id}|{catalog_sku_org_id}|{catalog_sku_id}" as returned by ListReservableResources.
  repeated string resourceIds = 10;
}

message GetGuaranteedCommitmentTemplateUrlRequest {
  // The guaranteed-commitments-provided external ID for the guaranteed-commitments IAM role trust policy.
  string externalId = 1;
}

message CreateGuaranteedCommitmentAccessRequest {
  // The AWS account ID (payer/target) where the stack was deployed.
  string target = 1;
  // The guaranteed-commitments-provided external ID.
  string externalId = 2;
}

// ------------------------ AZURE ONBOARDING REQUEST ------------------------

// StartAzureOnboardingRequest initiates Azure onboarding (Step 1).
// Ripple fields are required to link this Azure tenant to the correct
// Ripple billing group and company for cost attribution and management.
message StartAzureOnboardingRequest {
  // Ripple billing group ID. If present => MSP customer (3rd layer), else MSP-level org (2nd layer).
  string billingGroupId = 1;
  // Ripple company ID within the billing group.
  string companyId = 2;
  // Required. Archera / GuaranteedCommitments org ID.
  string gcOrgId = 3;
  // Azure tenant ID.
  string tenantId = 4;
  // Azure management subscription ID.
  string subscriptionId = 5;
}


// UpdateAzureOnboardingRequest updates the Archera onboarding record (Steps 2, 5.5, 7).
// The full onboarding state must be passed back as Archera requires it on every PATCH.
// The `org` field is the Archera org object received from the start/get response — pass it back verbatim.

message UpdateAzureOnboardingRequest {
  // Required. The onboarding ID returned from StartAzureOnboarding.
  string onboardingId = 1;
  // Required. Archera org ID.
  string gcOrgId = 2;
  // Ripple billing group ID (needed to persist Ripple context).
  string billingGroupId = 3;
  // Ripple company ID.
  string companyId = 4;

  // Azure fields — set only those that are being updated for this step.
  string tenantId = 5;
  string subscriptionId = 6;
  // "subscription" or "billing_account"
  string accountKind = 7;
  repeated string accountIds = 8;
  string blobContainer = 9;
  string resourceGroup = 10;
  string storageAccount = 11;
  string roleName = 12;
  google.protobuf.Value resourceGroupRegion = 13;
  google.protobuf.Value storageAccountRegion = 14;
  google.protobuf.Value resourceGroupTags = 15;
  google.protobuf.Value storageAccountTags = 16;

    // ---- Archera onboarding state fields (echo back from start/get response) ----
  bool completed = 17;
  string createdAt = 18;
  AzureOnboardingCreatedBy createdBy = 19;
  // Linked integration object; null until integration is created.
  google.protobuf.Value integration = 20;
  string integrationId = 21;
  // Always "azure".
  string provider = 22;
  // The full Archera org object received from StartAzureOnboarding response.
  // Must be echoed back verbatim on every PATCH call.
  AzureArcheraOrg org = 23;
}

// GetAzureOnboardingAuthUrlRequest fetches the OAuth authorization URL (Step 4).
message GetAzureOnboardingAuthUrlRequest {
  // Required. The onboarding ID.
  string onboardingId = 1;
  // Required. Archera org ID.
  string gcOrgId = 2;
  // Azure tenant ID.
  string tenantId = 3;
  // Azure management subscription ID.
  string subscriptionId = 4;
}

// ValidateAzureAppInstallRequest validates Azure app install / authorization.
// Called once before OAuth (step 3) to validate resource config,
// and once after OAuth (step 5) to confirm the user has authorized Archera.
// The full Archera onboarding state must be included — Archera requires it on every call.

message ValidateAzureAppInstallRequest {
  // Required. The onboarding ID.
  string onboardingId = 1;
  // Required. The Archera org ID.
  string gcOrgId = 2;
  // ---- Azure resource config fields ----
  // Integration type, always "cloud/azure".
  string type = 3;
  string tenantId = 4;
  string subscriptionId = 5;
  // "subscription" or "billing_account"
  string accountKind = 6;
  repeated string accountIds = 7;
  string blobContainer = 8;
  string resourceGroup = 9;
  string storageAccount = 10;
  string roleName = 11;
  google.protobuf.Value resourceGroupRegion = 12;
  google.protobuf.Value storageAccountRegion = 13;
  google.protobuf.Value resourceGroupTags = 14;
  google.protobuf.Value storageAccountTags = 15;
  // ---- Archera onboarding state fields (echo back from start/get response) ----
  bool completed = 16;
  string createdAt = 17;
  AzureOnboardingCreatedBy createdBy = 18;
  google.protobuf.Value integration = 19;
  string integrationId = 20;
  // Always "azure".
  string provider = 21;
  // The full Archera org object received from StartAzureOnboarding response.
  // Must be echoed back verbatim.
  AzureArcheraOrg org = 22;

}

// ListAzureOnboardingAccountsRequest lists available Azure accounts (Step 6).
message ListAzureOnboardingAccountsRequest {
  // Required. The onboarding ID.
  string onboardingId = 1;
  // Required. Archera org ID.
  string gcOrgId = 2;
}

// CreateAzureIntegrationRequest creates the final Azure integration (Step 8).
// Ripple fields are stored alongside Archera integration data to link
// the Azure tenant to the correct Ripple billing group/company/payer context.
message CreateAzureIntegrationRequest {
  // Required. Archera org ID.
  string gcOrgId = 1;
  // Ripple billing group ID — links this Azure integration to the Ripple billing group.
  string billingGroupId = 2;
  // Ripple company ID — links this Azure integration to the Ripple company/customer.
  string companyId = 3;
  // Ripple payer account ID — if applicable, the payer account this Azure spend rolls up to.
  string payerAccountId = 4;

  // Integration type, always "cloud/azure".
  string type = 5;
  string tenantId = 6;
  string subscriptionId = 7;
  string onboardingId = 8;
  // "subscription" or "billing_account"
  string accountKind = 9;
  repeated string accountIds = 10;
  string blobContainer = 11;
  string resourceGroup = 12;
  string storageAccount = 13;
  string roleName = 14;
  google.protobuf.Value resourceGroupRegion = 15;
  google.protobuf.Value storageAccountRegion = 16;
  google.protobuf.Value resourceGroupTags = 17;
  google.protobuf.Value storageAccountTags = 18;
}

// ListAzureIntegrationsRequest lists integrations to verify completion (Step 9).
message ListAzureIntegrationsRequest {
  // Required. Archera org ID.
  string gcOrgId = 1;
}


