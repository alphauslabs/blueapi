message GetOnboardingStatusResponse {
  enum OnboardingStatus {
    ONBOARDING_STATUS_UNSPECIFIED = 0;

    // No row found in archera_users (org not registered yet)
    ONBOARDING_STATUS_NOT_REGISTERED = 1;

    // Existing statuses you already persist
    ONBOARDING_STATUS_REGISTERED = 2;
    ONBOARDING_STATUS_ONBOARDING_STARTED = 3;
    ONBOARDING_STATUS_VERIFIED = 4;
    ONBOARDING_STATUS_VERIFY_INCOMPLETE = 5;
    ONBOARDING_STATUS_VERIFY_FAILED = 6;
  }

  // Whether we found a corresponding row
  bool found = 1;

  // Convenience: derived from whether billingId is empty
  bool isMsp = 2;

  // Vendor saved at registration (aws/azure/gcp). Optional.
  Provider provider = 3;

  // The org id to use for Archera upstream calls:
  // - MSP: mspArcheraOrgId
  // - company: archeraOrgId
  string gcOrgId = 4;

  // Latest persisted onboarding ID (if any)
  string onboardingId = 5;

  // Latest persisted onboarding status
  OnboardingStatus onboardingStatus = 6;

  // Latest persisted AWS account id (if any)
  string accountId = 7;

  string billingGroupId = 8;
  string companyId = 9;

  // Detailed AWS verification results (best-effort) returned from the last VerifyAwsOnboarding call.
  // This is used by the UI to "resume" the onboarding flow and show which verification checks
  // passed/failed when a user comes back later (e.g., after stopping at verification).
  // Empty when verification hasn't been attempted yet or when no checks were persisted.
  repeated VerifyAwsOnboardingResponse.AwsOnboardingFeatureCheck verificationChecks = 10;
}

message PayerAccountDetails {
  string accountId = 1;
  string accountName = 2;
  string rippleRegistrationStatus = 3;

  // Latest persisted guaranteed commitment setup/onboarding status for this payer account (if any)
  GetOnboardingStatusResponse.OnboardingStatus gcSetupStatus = 4;

  // Detailed AWS verification results (best-effort) returned from the last VerifyAwsOnboarding call.
  // This is used by the UI to "resume" the onboarding flow and show which verification checks
  // passed/failed when a user comes back later (e.g., after stopping at verification).
  // Empty when verification hasn't been attempted yet or when no checks were persisted.
  repeated VerifyAwsOnboardingResponse.AwsOnboardingFeatureCheck verificationChecks = 8;
}

message ListPayerAccountsResponse {
enum PayerAccountStatus {
    PAYER_ACCOUNT_STATUS_UNSPECIFIED = 0;
    PAYER_ACCOUNT_STATUS_ENABLED = 1;
    PAYER_ACCOUNT_STATUS_DISABLED = 2;
  }
  message PayerAccount {
    string accountId = 1;
    string accountName = 2;
    string billingGroupId = 3;
    string segmentId = 4;
    PayerAccountStatus status = 5;
    string companyId = 6;

    // Latest persisted onboarding status for this payer account (if any)
    GetOnboardingStatusResponse.OnboardingStatus onboardingStatus = 7;

    // Detailed AWS verification results (best-effort) returned from the last VerifyAwsOnboarding call.
    // This is used by the UI to "resume" the onboarding flow and show which verification checks
    // passed/failed when a user comes back later (e.g., after stopping at verification).
    // Empty when verification hasn't been attempted yet or when no checks were persisted.
    repeated VerifyAwsOnboardingResponse.AwsOnboardingFeatureCheck verificationChecks = 8;
  }
  repeated PayerAccount payerAccounts = 1;
  repeated PayerAccountDetails payerAccountDetails = 2;
}

message SetPayerAccountEnabledResponse {
  // Updated payer account row (same shape as list)
  ListPayerAccountsResponse.PayerAccount payerAccount = 1;
}

message GetPayerAccountStatusResponse {
  ListPayerAccountsResponse.PayerAccount payerAccount = 1;
}

message ListBillingGroupsResponse {
  enum BillingGroupStatus {
    BILLING_GROUP_STATUS_UNSPECIFIED = 0;
    BILLING_GROUP_STATUS_ENABLED = 1;
    BILLING_GROUP_STATUS_DISABLED = 2;
  }

  message BillingGroup {
    string companyId = 1;
    string billingGroupId = 2;
    string billingGroupName = 3;
    string companyName = 4;
    string payerAccountId = 5;
    string payerAccountName = 6;
    string segmentId = 7;
    string resourceType = 8;
    BillingGroupStatus status = 9;
    GetOnboardingStatusResponse.OnboardingStatus onboardingStatus = 10;
    repeated VerifyAwsOnboardingResponse.AwsOnboardingFeatureCheck verificationChecks = 11;
  }

  repeated BillingGroup billingGroups = 1;
}

message SetBillingGroupStatusResponse {
  ListBillingGroupsResponse.BillingGroup billingGroup = 1;
}

message GetBillingGroupStatusResponse {
  ListBillingGroupsResponse.BillingGroup billingGroup = 1;
}

message ValidateBillingGroupResponse {
  // True if the company is allowed to proceed with onboarding; false otherwise.
  bool ok = 1;

  // Optional human-readable reason when ok=false.
  string message = 2;

  // Optional machine-readable code for programmatic handling when ok=false.
  string code = 3;

  // Optional values that can be shown in translated messages.
  repeated string details = 4;
}

message ListDraftPurchasePlansResponse {
  repeated DefaultPurchasePlan plans = 1;
}

message DeleteDraftPurchasePlanResponse {
  // The ID of the deleted plan
  string planId = 1;
  // Indicates if the plan was successfully deleted
  bool success = 2;
}

message GetAvailableCommitmentTypesResponse {
  // List of available commitment type identifiers for the requested provider.
  // Example values: "aws/AmazonEC2", "aws/AmazonRDS", "aws/AmazonElastiCache",
  // "aws/savingsplan/Compute", "aws/savingsplan/EC2Instance", "aws/savingsplan/Database".
  repeated string types = 1;
}

message GetGuaranteedCommitmentTemplateUrlResponse {
  // CloudFormation console launch URL pre-filled with all parameters.
  string launchUrl = 1;
  // S3 URL of the CloudFormation template.
  string templateUrl = 2;
  // CloudFormation stack name.
  string stackName = 3;
  // Alphaus AWS account principal.
  string principal = 4;
  // Alphaus/Ripple external ID for role assumption.
  string externalId = 5;
  // Guaranteed commitment AWS principal ARN.
  string guaranteedCommitmentPrincipal = 6;
  // Guaranteed commitment external ID for role assumption.
  string guaranteedCommitmentExternalId = 7;
}

message CreateGuaranteedCommitmentAccessResponse {
  // Target environment for the access configuration (for example, AWS account ID or organization).
  string target = 1;
  // ARN of the Ripple/Alphaus IAM role to be assumed for managing guaranteed commitments.
  string rippleRoleArn = 2;
  // External ID required to assume the Ripple/Alphaus IAM role.
  string rippleExternalId = 3;
  // ARN of the customer's IAM role used specifically for guaranteed-commitment operations.
  string guaranteedCommitmentRoleArn = 4;
  // External ID required to assume the guaranteed-commitment IAM role.
  string guaranteedCommitmentExternalId = 5;
  // CloudFormation stack ID created or used during the access configuration.
  string stackId = 6;
  // AWS region where the CloudFormation stack is deployed (for example, "us-east-1").
  string stackRegion = 7;
  // URL of the CloudFormation template used to create or update the stack.
  string templateUrl = 8;
  // Current status of the access configuration or underlying CloudFormation stack.
  string status = 9;
  // Last update time of this configuration, typically as an ISO 8601 timestamp.
  string lastUpdated = 10;
  // Whether the guaranteed commitment role was successfully verified during registration.
  bool guaranteedCommitmentVerified = 11;
}

message GetPurchasePlansDetailsResponse {

  // Plan basic info and detailed metrics
  DefaultPurchasePlan plan = 1;

  // Commitment line item
  repeated CommitmentPlanLineItem lineItems = 2;

  // Covered infrastructure resource matches
  repeated CommitmentPlanResourceMatch resourceMatches = 3;

  // Audit history of the plan
  repeated PlanHistoryEntry history = 4;
}         


// ------------------------ AZURE ONBOARDING RESPONSE ------------------------

// AzureArcheraOrgFeatureStatus is a single feature status entry within the Archera org object.
message AzureArcheraOrgFeatureStatus {
  google.protobuf.Value detail = 1;
  string feature = 2;
  string status = 3;
  string updatedAt = 4;
}

// AzureArcheraOrgLeaseBudget is the lease budget config within the Archera org object.
message AzureArcheraOrgLeaseBudget {
  double budget = 1;
  string createdAt = 2;
  int32 minTermMonths = 3;
}

// AzureArcheraOrg is the full Archera org object.
// Received from StartAzureOnboarding response and must be echoed back verbatim
// on every UpdateAzureOnboarding and ValidateAzureAppInstall call.
message AzureArcheraOrg {
  bool applyBalanceToPremiums = 1;
  bool authSsoOnly = 2;
  google.protobuf.Value awsMarketplaceOfferLink = 3;
  google.protobuf.Value azureMarketplaceOfferLink = 4;
  double balance = 5;
  bool billingActive = 6;
  string channelPartnerType = 7;
  google.protobuf.Value channelPartnership = 8;
  google.protobuf.Value contractEnd = 9;
  string createdAt = 10;
  google.protobuf.Value currency = 11;
  string defaultUserRole = 12;
  google.protobuf.Value discountInfo = 13;
  string domain = 14;
  google.protobuf.Value effectiveDate = 15;
  repeated AzureArcheraOrgFeatureStatus featureStatuses = 16;
  repeated string features = 17;
  google.protobuf.Value frugalMode = 18;
  google.protobuf.Value gcpMarketplaceOfferLink = 19;
  bool hasDiscount = 20;
  bool hasGris = 21;
  bool hasTdsPacProxyCredentials = 22;
  string id = 23;
  bool isLeaseBuybackAutomated = 24;
  bool isLeaseSwapAutomated = 25;
  bool isTdsPacProxy = 26;
  AzureArcheraOrgLeaseBudget leaseBudget = 27;
  int32 leaseBuybackLookbackDays = 28;
  int32 leaseSwapLookbackDays = 29;
  string name = 30;
  google.protobuf.Value partnerId = 31;
  bool planTrial = 32;
  string planTrialExpires = 33;
  string planTypeChosen = 34;
  string planTypeEffective = 35;
  google.protobuf.Value primaryAddress = 36;
  google.protobuf.Value promotionCode = 37;
  // Maps provider name to segment ID, e.g. {"aws": "...", "azure": "...", "unknown": "..."}
  map<string, string> providerRootSegmentIds = 38;
}

// AzureOnboardingCreatedBy identifies who triggered the onboarding.
message AzureOnboardingCreatedBy {
  string onboardingId = 1;
  string username = 2;
  string fullName = 3;
}

// AzureOnboardingState is the full Archera onboarding record state.
// Returned by StartAzureOnboarding, UpdateAzureOnboarding, ValidateAzureAppInstall.
message AzureOnboardingState {
  // Archera onboarding record ID.
  string onboardingId = 1;
  // Archera org ID.
  string orgId = 2;
  string provider = 3;
  bool completed = 4;
  string createdAt = 5;
  AzureOnboardingCreatedBy createdBy = 6;
  // Linked integration object (null until integration is created).
  google.protobuf.Value integration = 7;
  string integrationId = 8;
  // Outbound IPs Archera will use with this onboarding.
  repeated string archeraOutboundIps = 9;

  // Azure identity
  string tenantId = 10;
  string subscriptionId = 11;
  repeated string accountIds = 12;
  // "subscription" or "billing_account"
  string accountKind = 13;

  // Authorization state (nullable, use Value for JSON null interop)
  google.protobuf.Value appAuthValidated = 14;
  google.protobuf.Value appAuthorized = 15;

  // Azure resource configuration
  string blobContainer = 16;
  string resourceGroup = 17;
  string storageAccount = 18;
  string roleName = 19;
  google.protobuf.Value createResources = 20;
  google.protobuf.Value marketplaceCompleted = 21;
  google.protobuf.Value permissionLevel = 22;
  google.protobuf.Value resourceGroupRegion = 23;
  google.protobuf.Value storageAccountRegion = 24;
  google.protobuf.Value resourceGroupTags = 25;
  google.protobuf.Value storageAccountTags = 26;
  // The full Archera org object returned from Archera. Store this and pass it
  // back verbatim on every UpdateAzureOnboarding and ValidateAzureAppInstall call.
  AzureArcheraOrg org = 27;
}

// StartAzureOnboardingResponse is returned from StartAzureOnboarding.
message StartAzureOnboardingResponse {
  // Archera onboarding ID — pass this to all subsequent Azure onboarding RPCs.
  string onboardingId = 1;
  // Full onboarding state.
  AzureOnboardingState state = 2;
  // Ripple billing group ID
  string billingGroupId = 3;
  // Ripple company ID
  string companyId = 4;
}

// GetAzureOnboardingAuthUrlResponse contains the OAuth URL (Step 4).
message GetAzureOnboardingAuthUrlResponse {
  // The Microsoft OAuth URL the user must open to authorize Archera.
  string url = 1;
}

// AzureAccount is one available subscription or billing account (Step 6).
message AzureAccount {
  string accountId = 1;
  string accountName = 2;
  string accountStatus = 3;
  // Azure account type, e.g. "FreeTrial_2014-09-01", "PayAsYouGo", etc.
  string accountType = 4;
  // Whether this account is eligible for Archera onboarding.
  bool isEligible = 5;
}

// ListAzureOnboardingAccountsResponse returns accounts the user can select.
message ListAzureOnboardingAccountsResponse {
  repeated AzureAccount accounts = 1;
}

// AzureIntegrationFeatureStatus is a single feature check for an Azure integration (Step 9).
message AzureIntegrationFeatureStatus {
  string feature = 1;
  // "available", "missing", "warning", "unknown"
  string status = 2;
  // Detail strings or JSON describing why a feature is missing/warning.
  repeated string detail = 3;
}

// AzureIntegrationOnboarding is a summary of the onboarding linked to an integration.
message AzureIntegrationOnboarding {
  string id = 1;
  string orgId = 2;
  string provider = 3;
  string integrationId = 4;
  bool completed = 5;
  string createdAt = 6;
  AzureOnboardingCreatedBy createdBy = 7;
}

// AzureIntegration is the full Azure cloud integration record from Archera.
message AzureIntegration {
  string id = 1;
  bool active = 2;
  string name = 3;
  string provider = 4;
  // Always "cloud/azure".
  string type = 5;
  string orgId = 6;
  string userId = 7;
  string createdAt = 8;
  string updatedAt = 9;

  // Azure-specific
  string managementSubscriptionId = 10;
  // Azure tenant ID (stored as provider_organization_id in Archera).
  string providerOrganizationId = 11;
  string blobContainer = 12;
  string resourceGroup = 13;
  string storageAccount = 14;
  // "FOCUS" or "ActualCost"
  string costExportFormat = 15;

  // CUR/data state
  string curEarliestData = 16;
  string curReportName = 17;
  bool curUsable = 18;
  bool hasCurAccess = 19;
  bool hasFullReservationAccess = 20;

  // Feature verification checks
  repeated AzureIntegrationFeatureStatus featureStatuses = 21;
  // Linked onboarding records
  repeated AzureIntegrationOnboarding onboardings = 22;
  // Flexible config blob (etl_enabled, use_vm_ris_not_sps, etc.)
  google.protobuf.Struct config = 23;
}

// CreateAzureIntegrationResponse is returned after creating the Azure integration (Step 8).
// A "tenant_already_connected" error_code is treated as success.
message CreateAzureIntegrationResponse {
  // True if the integration was successfully created or already existed.
  bool success = 1;
  // Set when the Archera API returned an error (e.g. "tenant_already_connected").
  // "tenant_already_connected" is still considered success.
  string errorCode = 2;
  string errorMessage = 3;
  // The Archera integration ID, if available.
  string integrationId = 4;
  // Ripple billing group ID stored with this integration.
  string billingGroupId = 5;
  // Ripple company ID stored with this integration.
  string companyId = 6;
  // Ripple payer account ID echoed back.
  string payerAccountId = 7;
}

// ListAzureIntegrationsResponse contains all Azure integrations for the org (Step 9).
message ListAzureIntegrationsResponse {
  repeated AzureIntegration integrations = 1;
}